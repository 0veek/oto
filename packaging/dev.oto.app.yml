id: dev.oto.app
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: oto
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.a11y.Bus
  - --filesystem=xdg-data/oto:ro

modules:
  - name: oto
    buildsystem: simple
    build-commands:
      - ar x oto.deb
      - tar -xf data.tar.*
      - install -Dm755 usr/bin/oto /app/bin/oto
      - install -Dm644 dev.oto.app.desktop /app/share/applications/dev.oto.app.desktop
      - install -Dm644 dev.oto.app.metainfo.xml /app/share/metainfo/dev.oto.app.metainfo.xml
      # Install multiple hicolor sizes so HiDPI panels don't upscale a tiny PNG.
      - install -Dm644 icon-32.png /app/share/icons/hicolor/32x32/apps/dev.oto.app.png
      - install -Dm644 icon-128.png /app/share/icons/hicolor/128x128/apps/dev.oto.app.png
      - install -Dm644 icon-256.png /app/share/icons/hicolor/256x256/apps/dev.oto.app.png
      - install -Dm644 icon-512.png /app/share/icons/hicolor/512x512/apps/dev.oto.app.png
    sources:
      - type: file
        # install.sh copies the version/architecture-specific Tauri artifact
        # here so the manifest itself never needs a hard-coded filename.
        path: oto.deb
        dest-filename: oto.deb
      - type: file
        path: dev.oto.app.desktop
      - type: file
        path: dev.oto.app.metainfo.xml
      - type: file
        path: ../src-tauri/icons/32x32.png
        dest-filename: icon-32.png
      - type: file
        path: ../src-tauri/icons/128x128.png
        dest-filename: icon-128.png
      - type: file
        path: ../src-tauri/icons/256x256.png
        dest-filename: icon-256.png
      - type: file
        path: ../src-tauri/icons/512x512.png
        dest-filename: icon-512.png
